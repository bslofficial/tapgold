<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TapGold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11274199' data-sdk='show_11274199'></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- গেম সেকশন -->
    <div id="game-section" class="section active">
        <h2>স্বাগতম, <span id="username">ইউজার</span>!</h2>
        <div class="stats">গোল্ড: <span id="score">0</span> | এনার্জি: <span id="energy">100</span></div>
        
        <div id="tap-btn" class="tap-circle">🪙</div>

        <!-- বুস্ট এবং ভিডিও বাটন পাশাপাশি -->
        <div class="button-container">
            <button onclick="buyBoost()" class="boost-btn">🚀 বুস্ট (৫০০ গোল্ড)</button>
            <button onclick="watchRewardAd()" class="ad-btn">🎁 ভিডিও দেখুন</button>
        </div>
    </div>

    <!-- রেফারেল সেকশন -->
    <div id="refer-section" class="section">
        <h2>রেফারেল</h2>
        <div class="ref-box">
            <input type="text" id="ref-link" readonly value="লিংক লোড হচ্ছে...">
            <button onclick="copyRefLink()">কপি</button>
        </div>
    </div>

    <!-- লিডারবোর্ড সেকশন -->
    <div id="leaderboard-section" class="section">
        <h2>লিডারবোর্ড</h2>
        <ul id="leaderboard-list"><li>লোড হচ্ছে...</li></ul>
    </div>

    <!-- মোবাইল অ্যাপের মতো নিচের নেভিগেশন বার -->
    <div class="bottom-nav">
        <button onclick="switchTab('game')">🎮 গেম</button>
        <button onclick="switchTab('refer')">👥 রেফার</button>
        <button onclick="switchTab('leaderboard')">🏆 লিডারবোর্ড</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
