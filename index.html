<!-- নিচের অংশটি আপনার বডি ট্যাগের ভেতরে বাটন সেকশনে বসান -->
<div id="game-section" class="section active">
    <h2>স্বাগতম, <span id="username"></span>!</h2>
    <div class="stats">গোল্ড: <span id="score">0</span></div>
    
    <!-- বুস্ট এবং ভিডিও বাটন পাশাপাশি -->
    <div class="button-container" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button onclick="buyBoost()" style="flex: 1; padding: 15px; background: orange;">🚀 বুস্ট (৫০০ গোল্ড)</button>
        <button onclick="watchRewardAd()" style="flex: 1; padding: 15px; background: green; color: white;">🎁 ভিডিও দেখুন</button>
    </div>
</div>

<!-- মোবাইল অ্যাপের মতো নিচের নেভিগেশন বার -->
<div class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; display: flex; background: #333; color: white; padding: 10px;">
    <button onclick="switchTab('game')" style="flex: 1;">🎮 গেম</button>
    <button onclick="switchTab('refer')" style="flex: 1;">👥 রেফার</button>
    <button onclick="switchTab('leaderboard')" style="flex: 1;">🏆 লিডারবোর্ড</button>
</div>
