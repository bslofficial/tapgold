<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TapGold - Tap to Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>TapGold</h1>
            <p class="tagline">ট্যাপ করুন আর গোল্ড জমান!</p>
        </header>

        <div class="score-board">
            <h2>🏆 আপনার গোল্ড: <span id="score">0</span></h2>
        </div>

        <div class="tap-area">
            <div id="tap-btn" class="tap-circle">
                <span>🪙</span>
                <p>TAP</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
