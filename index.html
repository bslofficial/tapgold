<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TapGold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h2>🏆 গোল্ড: <span id="score">0</span></h2>
            <p>⚡ এনার্জি: <span id="energy">100</span>/100</p>
        </div>

        <div class="tap-area">
            <div id="tap-btn" class="tap-circle">🪙</div>
            <p>ট্যাপ করুন!</p>
        </div>

        <div class="footer-menu">
            <button onclick="buyBoost()">🚀 বুস্ট (৫০০ গোল্ড)</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
